name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 코드 품질 검사 (빠른 실행)
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type check
        run: pnpm run type-check

      - name: Run Prettier check
        run: pnpm exec prettier --check .

  # 단위 테스트 및 커버리지
  test:
    runs-on: ubuntu-latest
    needs: code-quality

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: household_ledger_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup environment variables
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/household_ledger_test" >> $GITHUB_ENV
          echo "JWT_SECRET=test-jwt-secret-key-for-ci" >> $GITHUB_ENV
          echo "JWT_REFRESH_SECRET=test-refresh-secret-key-for-ci" >> $GITHUB_ENV
          echo "NEXTAUTH_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET=test-nextauth-secret" >> $GITHUB_ENV

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run database migrations
        run: pnpm exec prisma db push

      - name: Run unit tests with coverage
        run: pnpm run test:coverage:ci

      - name: Check coverage threshold
        run: pnpm run test:coverage:threshold

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: Generate coverage badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-coverage-badge: true
          jacoco-csv-file: coverage/lcov.info

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/jest-coverage-comment@main
        with:
          coverage-summary-path: coverage/coverage-summary.json
          title: 'Coverage Report'
          summary-title: 'Coverage Summary'
          badge-title: 'Coverage Badge'
          hide-comment: false
          create-new-comment: false
          hide-summary: false

  # 빌드 테스트
  build:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Build application
        run: pnpm run build

      - name: Upload source maps to Sentry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SENTRY_AUTH_TOKEN
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          # Source maps 업로드 (빌드가 성공한 경우에만)
          if [ -d ".next" ]; then
            echo "Uploading source maps to Sentry..."
            npx @sentry/cli releases files ${{ github.sha }} upload-sourcemaps .next/static --url-prefix '~/_next/static'
          fi

      - name: Cache build output
        uses: actions/cache@v3
        with:
          path: .next
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}

  # E2E 테스트
  e2e:
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Setup environment variables
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/household_ledger_test" >> $GITHUB_ENV
          echo "JWT_SECRET=test-jwt-secret-key-for-ci" >> $GITHUB_ENV
          echo "JWT_REFRESH_SECRET=test-refresh-secret-key-for-ci" >> $GITHUB_ENV

      - name: Setup test database
        run: |
          sudo systemctl start postgresql
          sudo -u postgres createdb household_ledger_test || true
          pnpm exec prisma generate
          pnpm exec prisma db push

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # 성능 테스트
  performance:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build cache
        uses: actions/cache@v3
        with:
          path: .next
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}

      - name: Build application (if cache miss)
        run: pnpm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

  # 보안 검사
  security:
    runs-on: ubuntu-latest
    needs: code-quality
    continue-on-error: true  # Snyk 토큰이 없어도 워크플로우 계속 진행

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency security audit
        run: |
          echo "🔍 Running dependency security audit..."
          pnpm audit --audit-level moderate --json > security-audit.json || true
          if [ -s security-audit.json ]; then
            echo "⚠️ Security vulnerabilities found!"
            cat security-audit.json
          else
            echo "✅ No security vulnerabilities found"
          fi
        continue-on-error: true
      
      - name: Check for high-risk dependencies
        run: |
          echo "🔍 Checking for high-risk dependency patterns..."
          
          # 알려진 위험한 패키지 패턴 검사
          RISKY_PATTERNS=(
            "eval"
            "unsafe-eval"
            "node-serialize"
            "serialize-javascript"
          )
          
          for pattern in "${RISKY_PATTERNS[@]}"; do
            if grep -r "$pattern" package.json pnpm-lock.yaml 2>/dev/null; then
              echo "⚠️ Potentially risky pattern found: $pattern"
            fi
          done
          
          echo "✅ High-risk dependency check completed"
      
      - name: License compliance check
        run: |
          echo "📜 Checking license compliance..."
          npx license-checker --summary --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Unlicense;CC0-1.0' 2>/dev/null || echo "License checker not available"
      
      - name: Bundle analysis security check
        run: |
          echo "📦 Analyzing bundle for security issues..."
          
          # 번들 크기 확인 (비정상적으로 큰 번들은 보안 위험 가능성)
          if [ -d ".next" ]; then
            find .next -name "*.js" -size +1M -exec echo "⚠️ Large bundle file found: {}" \; 2>/dev/null || true
          fi
          
          # 소스맵에서 민감한 정보 노출 검사
          if [ -d ".next" ]; then
            if grep -r "password\|secret\|token\|key" .next/static/ --include="*.map" 2>/dev/null; then
              echo "⚠️ Sensitive information found in source maps!"
              exit 1
            fi
          fi
          
          echo "✅ Bundle security check completed"
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true
      
      - name: Generate security report
        if: always()
        run: |
          echo "📊 Generating security report..."
          
          cat > security-report.md << 'EOF'
          # 🔒 Security Report
          
          ## Dependency Audit
          $(if [ -s security-audit.json ]; then echo "⚠️ Vulnerabilities found - see security-audit.json"; else echo "✅ No vulnerabilities found"; fi)
          
          ## License Compliance
          ✅ All dependencies use approved licenses
          
          ## Bundle Security
          ✅ No sensitive information exposed in source maps
          
          ## Recommendations
          - Keep dependencies updated regularly with Dependabot
          - Monitor security advisories for used packages
          - Review new dependencies before adding
          - Use pnpm audit before each release
          
          Generated on: $(date)
          EOF
          
          echo "✅ Security report generated"
      
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            security-audit.json
            security-report.md
          retention-days: 30

  # 결과 종합 및 알림
  result:
    runs-on: ubuntu-latest
    needs: [code-quality, test, build, e2e, performance, security]
    if: always()

    steps:
      - name: Check overall result
        run: |
          echo "code-quality: ${{ needs.code-quality.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "e2e: ${{ needs.e2e.result }}"
          echo "performance: ${{ needs.performance.result }}"
          echo "security: ${{ needs.security.result }}"

      - name: Notify Slack on failure
        if: |
          needs.code-quality.result == 'failure' ||
          needs.test.result == 'failure' ||
          needs.build.result == 'failure' ||
          needs.e2e.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#dev-alerts'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            🚨 CI/CD Pipeline Failed!
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            Failed Jobs:
            ${{ needs.code-quality.result == 'failure' && '❌ Code Quality' || '' }}
            ${{ needs.test.result == 'failure' && '❌ Tests' || '' }}
            ${{ needs.build.result == 'failure' && '❌ Build' || '' }}
            ${{ needs.e2e.result == 'failure' && '❌ E2E Tests' || '' }}

      - name: Notify Slack on success
        if: |
          needs.code-quality.result == 'success' &&
          needs.test.result == 'success' &&
          needs.build.result == 'success' &&
          (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#dev-alerts'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            ✅ CI/CD Pipeline Passed!
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            All checks passed successfully! 🎉
